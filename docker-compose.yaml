
services:
  reverse-proxy:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend1
      - backend
      - frontend2
    networks:
      - web
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SYNC_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:80}
      FEATURE_PDF_EXPORT: ${FEATURE_PDF_EXPORT:-false}
      FEATURE_THEMES: ${FEATURE_THEMES:-false}
      FEATURE_RATE_LIMITING: ${FEATURE_RATE_LIMITING:-true}
      RATE_LIMIT_AUTH: ${RATE_LIMIT_AUTH:-10/minute}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - web
    restart: unless-stopped

  frontend1:
    build:
      context: ./frontend1
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
      SECRET_KEY: ${FRONTEND1_SECRET_KEY}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
    depends_on:
      - backend
    networks:
      - web
    restart: unless-stopped

  frontend2:
    build:
      context: ./frontend2
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://backend:8000
      SECRET_KEY: ${FRONTEND2_SECRET_KEY}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
    depends_on:
      - backend
    networks:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true
