<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}MyOwnPage Dashboard{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/app/static/css/main.css" />
</head>
<body class="h-full font-sans text-gray-900">

  <!-- ── Navigation ── -->
  {% if session.get('username') %}
  <nav class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 flex items-center justify-between h-14">
      <a href="/app" class="text-lg font-semibold text-indigo-600 hover:text-indigo-700">
        MyOwnPage
      </a>
      <div class="flex items-center gap-4 text-sm text-gray-600">
        <span>👤 {{ session.get('username') }}</span>
        <form method="POST" action="/app/logout" class="inline">
          <button type="submit"
            class="text-gray-500 hover:text-red-600 transition-colors">
            Sign out
          </button>
        </form>
      </div>
    </div>
  </nav>
  {% endif %}

  <!-- ── Flash messages ── -->
  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="max-w-6xl mx-auto px-4 pt-4 space-y-2" id="flash-container">
    {% for category, message in messages %}
    <div class="rounded-md px-4 py-3 text-sm flex items-center justify-between
      {% if category == 'error' %} bg-red-50 text-red-700 border border-red-200
      {% elif category == 'success' %} bg-green-50 text-green-700 border border-green-200
      {% else %} bg-blue-50 text-blue-700 border border-blue-200 {% endif %}">
      <span>{{ message }}</span>
      <button onclick="this.parentElement.remove()" class="ml-4 opacity-60 hover:opacity-100">✕</button>
    </div>
    {% endfor %}
  </div>
  {% endif %}
  {% endwith %}

  <!-- ── Page content ── -->
  <main class="{% block main_class %}max-w-6xl mx-auto px-4 sm:px-6 py-8{% endblock %}">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
