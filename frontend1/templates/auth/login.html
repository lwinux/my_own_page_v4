{% extends "base.html" %}
{% block title %}Sign In — MyOwnPage{% endblock %}

{% block main_class %}min-h-screen flex items-center justify-center px-4{% endblock %}

{% block content %}
<div class="w-full max-w-md">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold text-indigo-600">MyOwnPage</h1>
    <p class="text-gray-500 mt-1 text-sm">Profile publishing for every opportunity</p>
  </div>

  <div class="bg-white rounded-2xl shadow-md border border-gray-100 p-8">
    <h2 class="text-xl font-semibold mb-6">Sign in to your account</h2>

    <form method="POST" action="/app/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input type="email" name="email" value="{{ email or '' }}" required
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="you@example.com" autocomplete="email" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
          placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 text-white rounded-lg py-2.5 text-sm font-semibold hover:bg-indigo-700 transition-colors">
        Sign In
      </button>
    </form>

    <p class="text-center text-sm text-gray-500 mt-6">
      No account?
      <a href="/app/register" class="text-indigo-600 hover:underline font-medium">Register</a>
    </p>
  </div>
</div>
{% endblock %}
