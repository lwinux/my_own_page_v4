apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
# Injected at deploy time from GitHub Secret POSTGRES_PASSWORD via envsubst.
# Must match the password embedded in backend-secrets.yaml DATABASE_URL.
stringData:
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
