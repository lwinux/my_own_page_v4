apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
data:
  REDIS_URL: "redis://redis:6379/0"
  APP_ENV: "production"
  DEBUG: "false"
  # INGRESS_HOST is substituted at deploy time via envsubst in CI
  ALLOWED_ORIGINS: "https://${INGRESS_HOST}"
  FEATURE_RATE_LIMITING: "true"
  RATE_LIMIT_AUTH: "10/minute"
  FEATURE_PDF_EXPORT: "false"
  FEATURE_THEMES: "false"
