apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
type: Opaque
# All values are injected at deploy time from GitHub Secrets via envsubst.
# POSTGRES_PASSWORD must match postgres-secret.yaml.
stringData:
  DATABASE_URL: "postgresql+asyncpg://profile_user:${POSTGRES_PASSWORD}@postgres:5432/profile_db"
  DATABASE_SYNC_URL: "postgresql+psycopg2://profile_user:${POSTGRES_PASSWORD}@postgres:5432/profile_db"
  JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
