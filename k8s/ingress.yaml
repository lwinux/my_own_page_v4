apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myownpage-ingress
  labels:
    app.kubernetes.io/name: myownpage
  annotations:
    # nginx Ingress Controller (install via: helm install ingress-nginx ingress-nginx/ingress-nginx)
    # To use AWS ALB instead: replace ingressClassName with "alb" and add
    #   kubernetes.io/ingress.class: alb
    #   alb.ingress.kubernetes.io/scheme: internet-facing
    #   alb.ingress.kubernetes.io/target-type: ip
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # cert-manager: automatically issue and renew Let's Encrypt certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - profile.diogohack.shop
      secretName: myownpage-tls
  rules:
    - host: profile.diogohack.shop
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  name: http
          - path: /app
            pathType: Prefix
            backend:
              service:
                name: frontend1
                port:
                  name: http
          # Exact root "/" goes directly to the dashboard (frontend1).
          # All other paths (/<slug>-<token>) fall through to the Prefix "/" below.
          - path: /
            pathType: Exact
            backend:
              service:
                name: frontend1
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend2
                port:
                  name: http
