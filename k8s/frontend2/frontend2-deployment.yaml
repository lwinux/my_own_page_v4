apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend2
  labels:
    app.kubernetes.io/name: frontend2
    app.kubernetes.io/component: public
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend2
        app.kubernetes.io/component: public
    spec:
      containers:
        - name: frontend2
          # ${DOCKERHUB_USERNAME} and ${IMAGE_TAG} are substituted by envsubst in CI.
          image: ${DOCKERHUB_USERNAME}/my-own-web-page-frontend2:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5002
          envFrom:
            - configMapRef:
                name: frontend2-config
            - secretRef:
                name: frontend2-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          startupProbe:
            httpGet:
              path: /health
              port: 5002
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
