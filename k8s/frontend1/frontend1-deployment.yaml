apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend1
  labels:
    app.kubernetes.io/name: frontend1
    app.kubernetes.io/component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend1
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: frontend1
          # ${DOCKERHUB_USERNAME} and ${IMAGE_TAG} are substituted by envsubst in CI.
          image: ${DOCKERHUB_USERNAME}/my-own-web-page-frontend1:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5001
          envFrom:
            - configMapRef:
                name: frontend1-config
            - secretRef:
                name: frontend1-secret
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          startupProbe:
            httpGet:
              path: /app/health
              port: 5001
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /app/health
              port: 5001
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /app/health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
