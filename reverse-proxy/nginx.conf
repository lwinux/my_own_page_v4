worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss text/javascript;

    upstream frontend1_upstream {
        server frontend1:5001;
        keepalive 32;
    }

    upstream backend_upstream {
        server backend:8000;
        keepalive 32;
    }

    upstream frontend2_upstream {
        server frontend2:5002;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # ── Backend API ────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://backend_upstream;
        }

        # ── Dashboard UI (frontend1) ───────────────────────────────────────
        location /app {
            proxy_pass http://frontend1_upstream;
        }

        # ── Frontend1 static assets ───────────────────────────────────────
        location /app/static/ {
            proxy_pass http://frontend1_upstream;
            expires 1d;
            add_header Cache-Control "public, immutable";
        }

        # ── Root redirect to dashboard ─────────────────────────────────────
        location = / {
            return 302 /app;
        }

        # ── Public profile pages (catch-all → frontend2) ───────────────────
        # Must be last — matches /<profile_slug>-<token> and any other path
        location / {
            proxy_pass http://frontend2_upstream;
        }
    }
}
