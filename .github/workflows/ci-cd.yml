name: CI/CD Pipeline
on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION:        ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME:  ${{ secrets.EKS_CLUSTER_NAME }}
  K8S_NAMESPACE:     ${{ secrets.K8S_NAMESPACE }}
  DOCKER_ORG:        ${{ secrets.DOCKER_ORG }}
  INGRESS_HOST:      ${{ secrets.INGRESS_HOST }}

jobs:
  build:
    name: Build & Push (${{ matrix.service.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false #default ist in gh true - hiermit deaktiviert, damit alle services gebaut werden, auch wenn einer fehlschlägt
      matrix:
        service:
          - name: backend
            context: backend
            image: my-own-web-page-backend
          - name: frontend1
            context: frontend1
            image: my-own-web-page-frontend1
          - name: frontend2
            context: frontend2
            image: my-own-web-page-frontend2

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.service.context }}
          push: true
          tags: |
            ${{ secrets.DOCKER_ORG }}/${{ matrix.service.image }}:${{ github.sha }}
            ${{ secrets.DOCKER_ORG }}/${{ matrix.service.image }}:latest
          cache-from: type=gha #lädt Cache beim nächsten Run für schnellere builds
          cache-to: type=gha,mode=max #speichert Docker Layer im GitHub Cache, Docker hat keinen Cache
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
      K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.0

      - name: Update kubeconfig (EKS)
        run: aws eks update-kubeconfig --region "$AWS_REGION" --name "$EKS_CLUSTER_NAME"

      - name: Who am I (STS)?
        run: aws sts get-caller-identity

      - name: Ensure namespace exists
        run: |
          kubectl get ns "$K8S_NAMESPACE" >/dev/null 2>&1 || kubectl create ns "$K8S_NAMESPACE"

      - name: Apply prerequisites (secrets/configmaps/pvc)
        run: |
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/db/postgres-secret.yaml
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/db/postgres-configmap.yaml
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/db/postgres-pvc.yaml

          # --- Backend prerequisites ---
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/backend/backend-secrets.yaml
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/backend/backend-configmap.yaml

      - name: Apply deployments
        run: |
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/db/postgres-deployment.yaml
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/redis/redis-deployment.yaml
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/backend/backend-deployment.yaml

      - name: Apply services
        run: |
          set -euo pipefail

          kubectl apply -n "$K8S_NAMESPACE" -f k8s/db/postgres-service.yaml
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/redis/redis-service.yaml
          kubectl apply -n "$K8S_NAMESPACE" -f k8s/backend/backend-service.yaml

      - name: Wait for rollouts
        run: |
          set -euo pipefail

          kubectl -n "$K8S_NAMESPACE" rollout status deployment/postgres --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/redis --timeout=180s
          kubectl -n "$K8S_NAMESPACE" rollout status deployment/backend --timeout=180s

      - name: Debug snapshot (on failure)
        if: failure()
        run: |
          set -euo pipefail
          echo "=== Pods ==="
          kubectl -n "$K8S_NAMESPACE" get pods -o wide
          echo "=== PVC ==="
          kubectl -n "$K8S_NAMESPACE" get pvc
          echo "=== Describe postgres pod ==="
          POD=$(kubectl -n "$K8S_NAMESPACE" get pod -l app=postgres -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "${POD:-}" ]; then
            kubectl -n "$K8S_NAMESPACE" describe pod "$POD"
            echo "=== Logs postgres pod ==="
            kubectl -n "$K8S_NAMESPACE" logs "$POD" --all-containers=true --tail=200 || true
          fi
          echo "=== Events (last 80) ==="
          kubectl -n "$K8S_NAMESPACE" get events --sort-by=.lastTimestamp | tail -n 80
            - name: Sanity check (pods + services)
              run: |
                kubectl -n "$K8S_NAMESPACE" get pods -o wide
                kubectl -n "$K8S_NAMESPACE" get svc -o wide